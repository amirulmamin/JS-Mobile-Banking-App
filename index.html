<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Mobile Banking App</title>
  </head>
  <body>
    <!-- Mobile Window -->
     <div class="relative w-[375px] h-[812px] border-4 border-black rounded-[40px] mx-auto mt-10 shadow-lg overflow-hidden">
        <h1 class="p-4 text-2xl text-center w-max aspect-square rounded-full mx-auto my-5 bg-black text-white">
            <i class="fa-solid fa-house-user"></i>
        </h1>
        <h2 class="text-center text-xl font-semibold">Mobile Banking</h2>
        <h3 class="text-center text-xs">Sign in to your account</h3>
        <!-- Login Form -->
        <form class="flex flex-col gap-4 p-6 mt-6" id="loginForm">
            <div class="flex flex-col gap-2">
                <label for="email" class="text-sm font-medium text-gray-700">Email</label>
                <input id="email" name="email" type="email" required class="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <div class="flex flex-col gap-2">
                <label for="password" class="text-sm font-medium text-gray-700">Password</label>
                <input id="password" name="password" type="password" class="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required />
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-gray-700">
                    <input id="remember" name="remember" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                    Remember Me
                </label>
                <a href="#" class="text-blue-600 hover:text-blue-700 hover:underline">Forget Password</a>
            </div>

            <button type="submit" class="bg-blue-600 text-white rounded-lg p-3 mt-2 hover:bg-blue-700 transition">Sign-In</button>
            <p class="text-center text-sm text-gray-600 mt-2">
                Don't have an account?
                <a href="#" class="text-blue-600 hover:text-blue-700 hover:underline font-medium">Sign Up</a>
            </p>
        </form>

        <script>
            // prefill email/checkbox if user previously asked to be remembered
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
            }

            document.getElementById("loginForm").addEventListener("submit", e => {
                e.preventDefault();
                e.stopPropagation();
                const formData = new FormData(e.target);
                const email = formData.get("email");
                const password = formData.get("password");
                const remember = formData.get("remember") === "on";

                if(email === "user@example.com"  && password === "password123") {
                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }

                    localStorage.setItem("loggedIn", "true");
                    localStorage.setItem("balance", 5000);
                    alert("Login Successful!");
                    window.location.href = "dashboard.html";
                } else {
                    alert("Invalid email or password.");
                }
            })

            if(localStorage.getItem("loggedIn") && localStorage.getItem("loggedIn") === "true") {
                window.location.href = "dashboard.html";
            }
        </script>

     </div>
  </body>
</html>
