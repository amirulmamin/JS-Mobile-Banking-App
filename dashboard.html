<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Mobile Banking App</title>
  </head>
  <body>
    <!-- Mobile Window -->
     <div class="relative w-[375px] h-[812px] border-4 border-black rounded-[40px] mx-auto mt-10 shadow-lg overflow-hidden">
        <header class="bg-blue-600 text-white p-6 pb-12">
            <section class="grid grid-cols-2 items-center ">
                <div>
                    <p class="text-xs">Good Morning</p>
                    <h1 class="text-2xl font-bold">John Doe</h1>
                </div>
                <div class="text-right">
                    <button class="p-3 aspect-square rounded-full border cursor-pointer bg-white text-blue-600 hover:bg-gray-100 transition">
                        <i class="fa-solid fa-user"></i>
                    </button>
                </div>
            </section>
            <section class="p-6 border rounded-lg bg-white/10 mt-4">
                <h2 class="text-sm">Total Balance</h2>
                <p class="text-xl font-bold">$5250.75</p>
            </section>
        </header>
        <main class="px-6 grid grid-cols-4 gap-1 *:border *:flex *:flex-col *:items-center *:gap-2 -mt-6 *:aspect-square *:justify-center *:rounded-lg *:bg-white/80 *:cursor-pointer *:hover:bg-white/90 *:transition-all *:duration-300  *:[&>i]:text-2xl *:[&>span]:text-xs">
            <div>
                <i class="fa-solid fa-dollar-sign"></i>
                <span>Add Money</span>
            </div>
            <div>
                <i class="fa-solid fa-circle-dollar-to-slot"></i>
                <span>Cash Out</span>
            </div>
            <div>
                <i class="fa-solid fa-money-bill-transfer"></i>
                <span>Send Money</span>
            </div>
            <div>
                <i class="fa-solid fa-credit-card"></i>
                <span>Pay Bill</span>
            </div>
        </main>
        <footer class="absolute bottom-0 right-0 left-0 grid grid-cols-4 *:border *:flex *:flex-col *:items-center *:gap-2 *:aspect-square *:justify-center *:rounded-lg *:bg-white/80 *:cursor-pointer *:hover:bg-white/90 *:transition-all *:duration-300  *:[&>i]:text-2xl *:[&>span]:text-xs">
            <div>
                <i class="fa-solid fa-dollar-sign"></i>
                <span>Add Money</span>
            </div>
            <div>
                <i class="fa-solid fa-circle-dollar-to-slot"></i>
                <span>Cash Out</span>
            </div>
            <div>
                <i class="fa-solid fa-money-bill-transfer"></i>
                <span>Send Money</span>
            </div>
            <div>
                <i class="fa-solid fa-credit-card"></i>
                <span>Pay Bill</span>
            </div>
        </footer>
     </div>
  </body>
</html>
