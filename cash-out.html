<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Mobile Banking App</title>
  </head>
  <body>
    <!-- Mobile Window -->
     <div class="relative w-[375px] h-[812px] border-4 border-black rounded-[40px] mx-auto mt-10 shadow-lg overflow-hidden">
        <header class="bg-blue-600 text-white p-6 pb-12">
            <section class="grid grid-cols-2 items-center ">
                <div>
                    <p class="text-xs">Good Morning</p>
                    <h1 class="text-2xl font-bold">John Doe</h1>
                </div>
                <div class="text-right">
                    <button class="p-3 aspect-square rounded-full border cursor-pointer bg-white text-blue-600 hover:bg-gray-100 transition">
                        <i class="fa-solid fa-user"></i>
                    </button>
                </div>
            </section>
            <section class="p-6 border rounded-lg bg-white/10 mt-4">
                <h2 class="text-sm">Total Balance</h2>
                <p class="text-xl font-bold" id="balance">$5250.75</p>
            </section>
        </header>
        <main class="px-6 grid grid-cols-4 gap-1 *:border *:flex *:flex-col *:items-center *:gap-2 -mt-6 *:aspect-square *:justify-center *:rounded-lg *:bg-white/80 *:cursor-pointer *:hover:bg-white/90 *:transition-all *:duration-300  *:[&>i]:text-2xl *:[&>span]:text-xs *:[&.active]:bg-blue-600 *:[&.active]:text-white">
            <a href="./add-money.html">
                <i class="fa-solid fa-dollar-sign"></i>
                <span>Add Money</span>
            </a>
            <a href="./cash-out.html" class="active">
                <i class="fa-solid fa-circle-dollar-to-slot"></i>
                <span>Cash Out</span>
            </a>
            <a href="./send-money.html">
                <i class="fa-solid fa-money-bill-transfer"></i>
                <span>Send Money</span>
            </a>
            <a href="./pay-bill.html">
                <i class="fa-solid fa-credit-card"></i>
                <span>Pay Bill</span>
            </a>
        </main>
        <main class="p-6">
            <!-- Cash Out Form -->
             <form action="" id="cashOutForm">
                <!-- Add AGent Number -->
                 <label for="agent-number" class="block mb-2 font-semibold">Enter Agent Number</label>
                 <input type="text" id="agent-number" name="agent-number" placeholder="Agent Number" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600" />
                 <label for="amount" class="block mb-2 font-semibold">Enter Amount to Cash Out</label>
                 <input type="number" id="amount" name="amount" placeholder="$0.00" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600" />
                 <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">Cash Out</button>
             </form>
        </main>
        <footer class="absolute bottom-0 right-0 left-0 grid grid-cols-4 gap-[1px] *:flex *:flex-col *:items-center *:gap-2 *:aspect-square *:justify-center *:bg-blue-600 *:text-white *:cursor-pointer *:hover:bg-blue-600/90 *:transition-all *:duration-300  *:[&>i]:text-2xl *:[&>span]:text-xs *:[&.active]:bg-blue-800 *:[&.active]:font-bold">
            <a href="./dashboard.html">
                <i class="fa-solid fa-house-user"></i>
                <span>Home</span>
            </a>
            <a href="./history.html">
                <i class="fa-solid fa-timeline"></i>
                <span>History</span>
            </a>
            <a href="./profile.html">
                <i class="fa-solid fa-users"></i>
                <span>Profile</span>
            </a>
            <a href="./log-out.html">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>Log Out</span>
            </a>
        </footer>
     </div>

     <script>
        if(localStorage.getItem("loggedIn") && localStorage.getItem("loggedIn") === "true") {
            // user is logged In, stay on the dashboard
            let balance = localStorage.getItem("balance");
            document.querySelector("h1").innerText = 'Balance: BDT (balance)';
        } else {
            // user is not logged In, redirect to login page
            window.location.href = "index.html";
        }

        const cashOutForm = document.getElementById('cashOutForm')
        cashOutForm.addEventListener('submit', e => {
            e.preventDefault();
            e.stopPropagation();
            const formData = new FormData('cashOutForm');
            const agentNumber = formData.get('agent-number');
            const amount = +formData.get('amount');
            if (!agentNumber || !amount) {
                alert('Please fill in all fields');
                return;
            }
            let balance = +localStorage.getItem("balance");
            if (amount > balance) {
                alert ('Insufficient Balance');
                return;
            }

                // Update Balance
                balance -= amount;
                localStorage.setItem("balance", balance);
                const transaction = {
                id: Date.now(),
                type: 'cash-out',
                source: 'Agent',
                sourceDetails: agentNumber,
                amount,
                date: new Date().toLocaleDateString()
            };
                //transaction
            if(!localStorage.getItem('history')){
                localStorage.setItem('history', JSON.stringify([transaction]));
            } else {
                const existingHistory = JSON.parse(localStorage.getItem('history'));
                existingHistory.push(transaction);
                localStorage.setItem('history', JSON.stringify(existingHistory));
            }
            alert('Cash Out Successful!')
            cashOutForm.reset();
            document.getElementById("balance").innerText =  `BDT ${balance}`;
        })
     </script>
  </body>
</html>
