<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Mobile Banking App</title>
  </head>
  <body>
    <!-- Mobile Window -->
     <div class="relative w-[375px] h-[812px] border-4 border-black rounded-[40px] mx-auto mt-10 shadow-lg overflow-hidden">
        <header class="bg-blue-600 text-white p-6">
            <section class="text-center text-2xl">
               Mobile Banking App
            </section>
        </header>

        <main class="p-6 h-full">
            <!-- Profile Form with Profile image, name, email, mobile, gender, address and password -->
             <style>
                /* Hide Scrollbar but keep scrolling */
                .scrollbar-hide {
                    -ms-overflow-style: none; /* IE/Edge */
                    scrollbar-width: none; /* Firefox */
                }

                .scrollbar-hide::-webkit-scrollbar {
                    display: none; /* Chrome/Safari/Opera */
                }
             </style>


             <form action="" class="h-full overflow-y-scroll scrollbar-hide pb-40">
                <figure class="w-32 h-32 mx-auto mb-4">
                    <img src="./images/sample-photo.webp" alt="Profile Image" class="w-full h-full rounded-full object-cover">
                </figure>
                <label for="name" class="block mb-2 font-semibold">Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600" />
                
                <label for="email" class="block mb-2 font-semibold">Email</label>
                <input type="email" id="email" name="email" placeholder="john.doe@example.com" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600" />

                <label for="mobile" class="block mb-2 font-semibold">Mobile</label>
                <input type="tel" id="mobile" name="mobile" placeholder="+1 234 567 8901" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600" />

                <label for="gender" class="block mb-2 font-semibold">Gender</label>
                <select name="gender" id="gender" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>

                <label for="address" class="block mb-2 font-semibold">Address</label>
                <textarea name="address" id="address" placeholder="123 Main St, City, Country" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600"></textarea>

                <label for="password" class="block mb-2 font-semibold">Password</label>
                <input type="password" name="password" id="password" placeholder="********" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600" />

                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg  hover:bg-blue-700 transition">Update Profile</button>
             </form>
        </main>

        <footer class="absolute bottom-0 right-0 left-0 grid grid-cols-4 gap-[1px] *:flex *:flex-col *:items-center *:gap-2 *:aspect-square *:justify-center *:bg-blue-600 *:text-white *:cursor-pointer *:hover:bg-blue-600/90 *:transition-all *:duration-300  *:[&>i]:text-2xl *:[&>span]:text-xs *:[&.active]:bg-blue-800 *:[&.active]:font-bold">
            <a href="./dashboard.html">
                <i class="fa-solid fa-house-user"></i>
                <span>Home</span>
            </a>
            <a href="./history.html">
                <i class="fa-solid fa-timeline"></i>
                <span>History</span>
            </a>
            <a href="./profile.html" class="active">
                <i class="fa-solid fa-users"></i>
                <span>Profile</span>
            </a>
            <a href="./log-out.html">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>Log Out</span>
            </a>
        </footer>
     </div>
  </body>
</html>
